<VirtualHost *:80>
    ServerName localhost

    DocumentRoot /var/www/react/dist

    # Proxy uploads vers Symfony (évite localhost:8081 depuis le navigateur)
    ProxyPass /uploads http://localhost:8081/uploads
    ProxyPassReverse /uploads http://localhost:8081/uploads

    <Directory /var/www/react/dist>
        Require all granted
        Options -Indexes +FollowSymLinks
        AllowOverride All

        RewriteEngine On
        RewriteBase /

        # Ne pas réécrire les uploads (gérés par le proxy)
        RewriteRule ^uploads/ - [L]

        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/react_error.log
    CustomLog ${APACHE_LOG_DIR}/react_access.log combined
</VirtualHost>